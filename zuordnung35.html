<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Zuordnungsübung</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #4a5568;
            --success-color: #48bb78;
            --error-color: #f56565;
            --selected-color: #ed8936;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-align: center;
        }

        .instruction {
            text-align: center;
            margin-bottom: 25px;
            color: #718096;
            font-size: 1rem;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background: #edf2f7;
            border: 2px solid #cbd5e0;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            text-align: center;
            min-height: 56px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* Zustände */
        .item:hover:not(.matched):not(.selected) {
            background: #e2e8f0;
            border-color: #a0aec0;
        }

        .item.selected {
            background: #feebc8;
            border-color: var(--selected-color);
            transform: scale(1.02);
        }

        .item.matched {
            background: #c6f6d5;
            border-color: var(--success-color);
            color: #22543d;
            cursor: default;
        }

        .item.wrong {
            background: #fed7d7;
            border-color: var(--error-color);
            animation: shake 0.4s ease;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2d3748;
        }

        .feedback-message {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 24px;
            color: var(--success-color);
        }

        /* Animation für Fehler */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Responsive Design für Smartphones */
        @media (max-width: 650px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; }
            .matching-grid {
                grid-template-columns: 1fr; /* Spalten untereinander auf kleinen Bildschirben */
                gap: 25px;
            }
            .column-ru { order: 1; }
            .column-de { order: 2; }
            .item { padding: 12px; font-size: 0.95rem; }
            
            /* Visuelle Trennung im mobilen Layout */
            .column-ru::after {
                content: "↓ Finde die deutschen Übersetzungen unten ↓";
                display: block;
                text-align: center;
                color: #a0aec0;
                font-size: 0.85rem;
                margin-top: 10px;
                font-style: italic;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bedeutung & Anwendung zuordnen</h1>
    <p class="instruction">Klicke zuerst auf ein russisches Feld und anschließend auf die passende deutsche Übersetzung (oder umgekehrt)!</p>
    
    <div class="feedback-message" id="feedback"></div>

    <div class="matching-grid">
        <!-- Russische Spalte -->
        <div class="column column-ru" id="ru-column"></div>
        <!-- Deutsche Spalte -->
        <div class="column column-de" id="de-column"></div>
    </div>

    <div class="controls">
        <button id="restart-btn">Neustart</button>
    </div>
</div>

<script>
    // Die Paare basierend auf der Transkript-Anleitung
    const pairs = [
        { id: 1, ru: "ждать не дождаться", de: "etwas kaum erwarten können / sehnsüchtig auf etwas warten" },
        { id: 2, ru: "Я жду не дождусь, когда мы уже поедем в путешествие.", de: "Ich kann es kaum erwarten, bis wir endlich auf Reisen gehen." },
        { id: 3, ru: "Я очень сильно жду время, когда мы поедем в путешествие.", de: "Ich warte sehnsüchtig auf die Zeit, in der wir verreisen werden." },
        { id: 4, ru: "А чего вы жdete не дождетесь?", de: "Und worauf könnt ihr es kaum erwarten?" },
        { id: 5, ru: "Он ждет не дождется встречи.", de: "Er kann das Treffen kaum erwarten." }
    ];

    let selectedRu = null;
    let selectedDe = null;
    let matchedCount = 0;

    const ruColumn = document.getElementById('ru-column');
    const deColumn = document.getElementById('de-column');
    const feedbackEl = document.getElementById('feedback');
    const restartBtn = document.getElementById('restart-btn');

    // Fisher-Yates Shuffle zum Mischen der Spalten
    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initGame() {
        ruColumn.innerHTML = '';
        deColumn.innerHTML = '';
        feedbackEl.textContent = '';
        selectedRu = null;
        selectedDe = null;
        matchedCount = 0;

        // Spalten getrennt voneinander mischen, damit sie nicht parallel liegen
        const shuffledRu = shuffle(pairs);
        const shuffledDe = shuffle(pairs);

        // Russische Kärtchen generieren
        shuffledRu.forEach(pair => {
            const div = document.createElement('div');
            div.classList.add('item');
            div.textContent = pair.ru;
            div.dataset.id = pair.id;
            div.dataset.lang = 'ru';
            div.addEventListener('click', handleSelect);
            ruColumn.appendChild(div);
        });

        // Deutsche Kärtchen generieren
        shuffledDe.forEach(pair => {
            const div = document.createElement('div');
            div.classList.add('item');
            div.textContent = pair.de;
            div.dataset.id = pair.id;
            div.dataset.lang = 'de';
            div.addEventListener('click', handleSelect);
            deColumn.appendChild(div);
        });
    }

    function handleSelect(e) {
        const clickedEl = e.currentTarget;

        // Ignorieren, wenn das Element bereits richtig zugeordnet wurde
        if (clickedEl.classList.contains('matched')) return;

        const lang = clickedEl.dataset.lang;

        if (lang === 'ru') {
            // Falls schon eins gewählt war, Auswahl aufheben oder wechseln
            if (selectedRu) selectedRu.classList.remove('selected');
            selectedRu = clickedEl;
            selectedRu.classList.add('selected');
        } else {
            if (selectedDe) selectedDe.classList.remove('selected');
            selectedDe = clickedEl;
            selectedDe.classList.add('selected');
        }

        // Wenn aus beiden Sprachen eines gewählt wurde, prüfen
        if (selectedRu && selectedDe) {
            checkMatch();
        }
    }

    function checkMatch() {
        const idRu = selectedRu.dataset.id;
        const idDe = selectedDe.dataset.id;

        if (idRu === idDe) {
            // Richtiges Paar
            selectedRu.classList.remove('selected');
            selectedDe.classList.remove('selected');
            
            selectedRu.classList.add('matched');
            selectedDe.classList.add('matched');
            
            selectedRu = null;
            selectedDe = null;
            matchedCount++;

            if (matchedCount === pairs.length) {
                feedbackEl.textContent = "Hervorragend! Alles richtig zugeordnet! 🎉";
            }
        } else {
            // Falsches Paar
            const tempRu = selectedRu;
            const tempDe = selectedDe;

            tempRu.classList.add('wrong');
            tempDe.classList.add('wrong');

            selectedRu.classList.remove('selected');
            selectedDe.classList.remove('selected');
            selectedRu = null;
            selectedDe = null;

            // Fehler-Animation nach kurzer Zeit zurücksetzen
            setTimeout(() => {
                tempRu.classList.remove('wrong');
                tempDe.classList.remove('wrong');
            }, 400);
        }
    }

    restartBtn.addEventListener('click', initGame);

    // Start des Spiels beim Laden
    initGame();
</script>

</body>
</html>
