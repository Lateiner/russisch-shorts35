<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Richtig/Falsch-Quiz</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #4a5568;
            --success-color: #48bb78;
            --error-color: #f56565;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #cbd5e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-align: center;
        }

        .instruction {
            text-align: center;
            margin-bottom: 25px;
            color: #718096;
            font-size: 1rem;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--secondary-color);
        }

        .statement-box {
            background: #edf2f7;
            padding: 25px 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.5;
            text-align: center;
        }

        /* Die beiden großen Antwort-Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .quiz-btn {
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.15s, opacity 0.2s;
            outline: none;
        }

        .quiz-btn:active {
            transform: scale(0.98);
        }

        .btn-true {
            background-color: var(--success-color);
            border-color: #38a169;
        }

        .btn-false {
            background-color: var(--error-color);
            border-color: #e53e3e;
        }

        .quiz-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Feedback-Bereich */
        .feedback-box {
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: none;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .feedback-box.correct-ans {
            background-color: #f0fff4;
            border-color: var(--success-color);
            color: #22543d;
        }

        .feedback-box.wrong-ans {
            background-color: #fed7d7;
            border-color: var(--error-color);
            color: #742a2a;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #2d3748;
        }

        .nav-btn:disabled {
            background: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
        }

        #restart-btn {
            background: #718096;
        }
        #restart-btn:hover {
            background: #4a5568;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimierung */
        @media (max-width: 500px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; }
            .statement-box { font-size: 1.05rem; padding: 15px; }
            .quiz-btn { padding: 12px; font-size: 1rem; }
            .action-buttons { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Struktur- & Bedeutungscheck</h1>
    <p class="instruction">Bewerte die Behauptungen mit einem Klick auf Richtig oder Falsch!</p>
    
    <div class="quiz-header">
        <span id="progress-text">Frage 1 von 4</span>
        <span id="score-text">Punkte: 0</span>
    </div>

    <div class="statement-box" id="statement-display">
        <!-- Wird dynamisch geladen -->
    </div>

    <div class="action-buttons">
        <button class="quiz-btn btn-true" id="btn-true">RICHTIG</button>
        <button class="quiz-btn btn-false" id="btn-false">FALSCH</button>
    </div>

    <div class="feedback-box" id="feedback-display">
        <!-- Dynamische Erklärung -->
    </div>

    <div class="controls">
        <button class="nav-btn" id="restart-btn">Neustart</button>
        <button class="nav-btn" id="next-btn" disabled>Nächste Frage</button>
    </div>
</div>

<script>
    const quizData = [
        {
            statement: "„Die Phrase 'ждать не дождаться' drückt aus, dass man überhaupt keine Lust auf ein Ereignis hat.“",
            isTrue: false,
            explanation: "<strong>Falsch!</strong> Das Gegenteil ist der Fall: Der Ausdruck bedeutet, dass man etwas mit riesiger Vorfreude 'kaum erwarten kann'."
        },
        {
            statement: "„Bei der Redewendung wird das erste Verb konjugiert, das zweite Verb bleibt unverändert im Infinitiv.“",
            isTrue: false,
            explanation: "<strong>Falsch!</strong> Das ist ein beliebter Stolperstein. Es werden *beide* Verben an das Subjekt angepasst (z. B. 'Я жду не дождусь' oder 'Он ждет не дождется'). Beide Formen sind konjugiert!"
        },
        {
            statement: "„Der Ausdruck 'Я очень сильно жду...' ist grammatikalisch ebenfalls korrekt, um ein sehnsüchtiges Warten auszudrücken.“",
            isTrue: true,
            explanation: "<strong>Richtig!</strong> Dies ist die im Transkript genannte alternative Formulierung, um die hohe Intensität des Wartens zu beschreiben."
        },
        {
            statement: "„In der Phrase 'ждать не дождаться' wird zwischen den beiden Verben immer das Verneinungswort 'не' verwendet.“",
            isTrue: true,
            explanation: "<strong>Richtig!</strong> Das 'не' ist fester Bestandteil dieser idiomatischen Struktur und darf nicht durch 'нет' oder 'ни' ersetzt werden."
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    const statementDisplay = document.getElementById('statement-display');
    const feedbackDisplay = document.getElementById('feedback-display');
    const progressText = document.getElementById('progress-text');
    const scoreText = document.getElementById('score-text');
    const btnTrue = document.getElementById('btn-true');
    const btnFalse = document.getElementById('btn-false');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');

    function loadQuestion() {
        answered = false;
        nextBtn.disabled = true;
        feedbackDisplay.style.display = 'none';
        feedbackDisplay.className = 'feedback-box';
        btnTrue.disabled = false;
        btnFalse.disabled = false;

        if (currentIndex >= quizData.length) {
            statementDisplay.innerHTML = `<strong>Quiz beendet!</strong><br><br>Du hast alle Fragen beantwortet.`;
            btnTrue.disabled = true;
            btnFalse.disabled = true;
            nextBtn.style.display = 'none';
            progressText.textContent = "Fertig!";
            return;
        }

        nextBtn.style.display = 'block';
        progressText.textContent = `Frage ${currentIndex + 1} von ${quizData.length}`;
        scoreText.textContent = `Punkte: ${score}`;
        statementDisplay.textContent = quizData[currentIndex].statement;
    }

    function handleAnswer(userSelectedTrue) {
        if (answered) return;
        answered = true;

        btnTrue.disabled = true;
        btnFalse.disabled = true;

        const currentQuestion = quizData[currentIndex];
        const isCorrect = (userSelectedTrue === currentQuestion.isTrue);

        if (isCorrect) {
            score++;
            scoreText.textContent = `Punkte: ${score}`;
            feedbackDisplay.classList.add('correct-ans');
            feedbackDisplay.innerHTML = "🎉 <strong>Richtig!</strong> " + currentQuestion.explanation;
        } else {
            feedbackDisplay.classList.add('wrong-ans');
            feedbackDisplay.innerHTML = "❌ <strong>Leider falsch.</strong> " + currentQuestion.explanation;
        }

        feedbackDisplay.style.display = 'block';
        nextBtn.disabled = false;
    }

    btnTrue.addEventListener('click', () => handleAnswer(true));
    btnFalse.addEventListener('click', () => handleAnswer(false));

    nextBtn.addEventListener('click', () => {
        currentIndex++;
        loadQuestion();
    });

    restartBtn.addEventListener('click', () => {
        currentIndex = 0;
        score = 0;
        loadQuestion();
    });

    // Erster Aufruf beim Laden
    loadQuestion();
</script>

</body>
</html>
