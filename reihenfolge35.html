<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Intensität sortieren</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #4a5568;
            --success-color: #48bb78;
            --error-color: #f56565;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #cbd5e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-align: center;
        }

        .instruction {
            text-align: center;
            margin-bottom: 25px;
            color: #718096;
            font-size: 1rem;
        }

        .scale-info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        /* Die Ziel-Boxen */
        .order-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 2px dashed var(--border-color);
        }

        .slot {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            min-height: 60px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            position: relative;
            font-size: 1.1rem;
        }

        .slot-number {
            background: var(--secondary-color);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .slot-content {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .translation-hint {
            font-size: 0.9rem;
            color: #718096;
            font-style: italic;
        }

        /* Wort-Pool */
        .pool-title {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .words-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 60px;
            margin-bottom: 25px;
        }

        .phrase-card {
            background: var(--primary-color);
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            user-select: none;
            transition: all 0.2s ease;
        }

        .phrase-card:hover {
            background: #2b6cb0;
            transform: translateY(-2px);
        }

        /* Zustände */
        .slot.correct {
            border-color: var(--success-color);
            background: #f0fff4;
        }
        .slot.correct .slot-number {
            background: var(--success-color);
        }

        .status-msg {
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            min-height: 30px;
            margin-bottom: 15px;
            color: var(--success-color);
        }

        .controls {
            display: flex;
            justify-content: center;
        }

        button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2d3748;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; }
            .slot { font-size: 1rem; min-height: 50px; padding: 8px 12px; }
            .phrase-card { font-size: 0.95rem; padding: 10px 14px; }
            .slot-content { flex-direction: column; align-items: flex-start; gap: 2px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gefühlsintensität sortieren</h1>
    <p class="instruction">Klicke die Ausdrücke unten in der richtigen Reihenfolge an – beginnend beim schwächsten Warten bis zur maximalen Vorfreude!</p>
    
    <div class="status-msg" id="status-text"></div>

    <div class="scale-info">
        <span>Anfang (Normales Warten) ➔</span>
        <span>➔ Ziel (Kaum zu erwarten)</span>
    </div>

    <div class="order-container">
        <!-- Stufe 1 -->
        <div class="slot" id="slot-0">
            <div class="slot-number">1</div>
            <div class="slot-content" id="content-0"><em>Noch leer...</em></div>
        </div>
        <!-- Stufe 2 -->
        <div class="slot" id="slot-1">
            <div class="slot-number">2</div>
            <div class="slot-content" id="content-1"><em>Noch leer...</em></div>
        </div>
        <!-- Stufe 3 -->
        <div class="slot" id="slot-2">
            <div class="slot-number">3</div>
            <div class="slot-content" id="content-2"><em>Noch leer...</em></div>
        </div>
    </div>

    <div class="pool-title">Ausdrücke zum Anklicken:</div>
    <div class="words-pool" id="pool">
        <!-- Phrasen werden hier dynamisch reingeladen -->
    </div>

    <div class="controls">
        <button id="restart-btn">Neustart</button>
    </div>
</div>

<script>
    // Phrasen in der exakt richtigen Reihenfolge (von schwach nach stark)
    const intensityOrder = [
        { phrase: "Я жду", translation: "Ich warte" },
        { phrase: "Я очень сильно жду", translation: "Ich warte sehnsüchtig / sehr stark" },
        { phrase: "Я жду не дождусь", translation: "Ich kann es kaum erwarten!" }
    ];

    let currentSlotIndex = 0;
    const pool = document.getElementById('pool');
    const statusText = document.getElementById('status-text');
    const restartBtn = document.getElementById('restart-btn');

    // Mischen-Funktion
    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initGame() {
        currentSlotIndex = 0;
        statusText.textContent = '';
        pool.innerHTML = '';
        
        // Slots leeren
        for (let i = 0; i < 3; i++) {
            const slot = document.getElementById(`slot-${i}`);
            const content = document.getElementById(`content-${i}`);
            slot.classList.remove('correct');
            content.innerHTML = '<em>Noch leer...</em>';
        }

        // Gemischte Phrasen in den Pool laden
        const shuffled = shuffle(intensityOrder);
        shuffled.forEach(item => {
            const card = document.createElement('div');
            card.classList.add('phrase-card');
            card.textContent = item.phrase;
            
            // Klick-Event für die Zuordnung
            card.addEventListener('click', () => handleCardClick(item, card));
            pool.appendChild(card);
        });
    }

    function handleCardClick(item, cardElement) {
        // Prüfen, ob die gewählte Karte der aktuellen Intensitätsstufe entspricht
        const expectedItem = intensityOrder[currentSlotIndex];

        if (item.phrase === expectedItem.phrase) {
            // Richtig! In den aktuellen Slot einfügen
            const slot = document.getElementById(`slot-${currentSlotIndex}`);
            const content = document.getElementById(`content-${currentSlotIndex}`);
            
            slot.classList.add('correct');
            content.innerHTML = `<strong>${item.phrase}</strong> <span class="translation-hint">(${item.translation})</span>`;
            
            // Karte aus dem Pool löschen
            cardElement.remove();
            
            currentSlotIndex++;

            // Prüfen, ob alles fertig ist
            if (currentSlotIndex === intensityOrder.length) {
                statusText.textContent = "Hervorragend! Die Intensitätsskala ist komplett! 🎉";
            }
        } else {
            // Falsche Reihenfolge gewählt -> Karte blinkt kurz rot auf
            cardElement.style.backgroundColor = 'var(--error-color)';
            setTimeout(() => {
                cardElement.style.backgroundColor = '';
            }, 400);
        }
    }

    restartBtn.addEventListener('click', initGame);

    // Spiel beim Laden starten
    initGame();
</script>

</body>
</html>
